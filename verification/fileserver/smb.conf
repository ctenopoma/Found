[global]
   # AD メンバーサーバ設定 (検証B/D 用)
   workgroup = POC
   realm = POC.LOCAL
   security = ADS
   server role = member server

   winbind use default domain = yes
   winbind refresh tickets = yes
   winbind enum users = yes
   winbind enum groups = yes
   idmap config * : backend = tdb
   idmap config * : range = 3000-7999
   idmap config POC : backend = rid
   idmap config POC : range = 10000-999999

   # NTFS 互換 ACL を共有に適用 (検証A: ACL→検索フィルタの土台)
   vfs objects = acl_xattr
   map acl inherit = yes
   store dos attributes = yes

   load printers = no
   printing = bsd
   printcap name = /dev/null
   disable spoolss = yes

[share]
   comment = PoC shared folders
   path = /srv/share
   read only = no
   browseable = yes
   # 案件フォルダ配下に ACL を設定して権限出し分けを検証する
   inherit acls = yes
   inherit permissions = yes
